%YAML 1.2
---
launch:
  - executable:
      name: "px4_sitl"
      cmd: "build/px4_sitl_default/bin/px4 -i 0"
      cwd: "$(env HOME)/PX4-Autopilot"
      env:
        - name: "PX4_GZ_WORLD"
          value: "custom"
        
        - name: "PX4_SIM_MODEL"
          value: "gz_x500_custom_2"
        
        - name: "SYS_AUTOSTART"
          value: "22000"
      output: "screen"
